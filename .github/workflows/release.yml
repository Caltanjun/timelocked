name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_extension: tar.gz
            binary_file: timelocked
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_extension: zip
            binary_file: timelocked.exe
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_extension: tar.gz
            binary_file: timelocked
          - os: macos-14
            target: aarch64-apple-darwin
            archive_extension: tar.gz
            binary_file: timelocked

    env:
      ARCHIVE_FILE: timelocked-${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}-${{ matrix.target }}.${{ matrix.archive_extension }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix archive
        if: matrix.archive_extension == 'tar.gz'
        shell: bash
        run: |
          rm -rf dist package
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_file }}" "package/${{ matrix.binary_file }}"
          chmod 755 "package/${{ matrix.binary_file }}"
          cp README.md LICENSE-MIT LICENSE-APACHE package/
          tar -czf "dist/${ARCHIVE_FILE}" -C package .

      - name: Package Windows archive
        if: matrix.archive_extension == 'zip'
        shell: pwsh
        run: |
          Remove-Item dist, package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path dist | Out-Null
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_file }}" -Destination "package/${{ matrix.binary_file }}"
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE -Destination package
          Compress-Archive -Path "package\*" -DestinationPath "dist/${env:ARCHIVE_FILE}" -Force

      - name: Upload packaged archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ env.ARCHIVE_FILE }}
          if-no-files-found: error

  publish:
    name: publish assets
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum timelocked-* > SHA256SUMS.txt

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: Timelocked ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          notes_file="$RUNNER_TEMP/release-notes.md"

          if [[ "$RELEASE_TAG" == *-* ]]; then
            prerelease_flag="true"
          else
            prerelease_flag="false"
          fi

          gh api \
            --method POST \
            "repos/$REPOSITORY/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" \
            --jq .body > "$notes_file"

          if gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            edit_args=(release edit "$RELEASE_TAG" --repo "$REPOSITORY" --title "$RELEASE_TITLE" --notes-file "$notes_file")
            if [[ "$prerelease_flag" == "true" ]]; then
              edit_args+=(--prerelease)
            fi
            gh "${edit_args[@]}"
            gh release upload "$RELEASE_TAG" dist/* --repo "$REPOSITORY" --clobber
          else
            create_args=(release create "$RELEASE_TAG" dist/* --repo "$REPOSITORY" --title "$RELEASE_TITLE" --notes-file "$notes_file")
            if [[ "$prerelease_flag" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh "${create_args[@]}"
          fi
